<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم OFA STORE</title>
<style>
  :root{
    --bg:#0b1220;
    --panel:#111a2c;
    --panel-2:#0f1729;
    --border:#22304a;
    --text:#e7ecf5;
    --muted:#8a97ad;
    --green:#22c55e;
    --green-dim:#14532d;
    --yellow:#eab308;
    --red:#ef4444;
    --blue:#3b82f6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:radial-gradient(circle at 20% -10%, #142038 0%, var(--bg) 55%);
    color:var(--text);
    font-family:'Tahoma','Segoe UI',sans-serif;
    min-height:100vh;
    padding:20px;
  }
  .wrap{max-width:1100px;margin:0 auto;}
  header{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:24px;flex-wrap:wrap;gap:12px;
  }
  header h1{
    font-size:20px;margin:0;display:flex;align-items:center;gap:10px;
  }
  header h1 span.badge{
    font-size:11px;background:var(--green-dim);color:var(--green);
    padding:3px 10px;border-radius:20px;font-weight:bold;border:1px solid #16532d;
  }
  #auth-box{display:flex;align-items:center;gap:10px;}
  #user-pill{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--border);padding:6px 12px;border-radius:30px;font-size:13px;}
  #user-pill img{width:26px;height:26px;border-radius:50%;}
  button{font-family:inherit;cursor:pointer;border:none;}
  .btn{
    padding:9px 16px;border-radius:10px;font-weight:bold;font-size:13px;
    transition:.15s;
  }
  .btn:active{transform:scale(.96);}
  .btn-primary{background:var(--green);color:#04170a;}
  .btn-primary:hover{background:#16a34a;}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
  .btn-outline:hover{border-color:var(--red);color:var(--red);}
  .btn-blue{background:var(--blue);color:white;}
  .btn-blue:hover{background:#2563eb;}
  .btn-red{background:transparent;color:var(--red);border:1px solid #4a2222;}
  .btn-red:hover{background:#3a1414;}
  .btn-sm{padding:6px 10px;font-size:12px;border-radius:8px;}

  #login-screen{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:60vh;text-align:center;gap:16px;
  }
  #login-screen p{color:var(--muted);max-width:340px;font-size:13px;line-height:1.8;}

  .toolbar{
    display:flex;justify-content:space-between;align-items:center;gap:12px;
    margin-bottom:16px;flex-wrap:wrap;
  }
  .toolbar input, .toolbar select{
    background:var(--panel);border:1px solid var(--border);color:var(--text);
    padding:9px 12px;border-radius:10px;font-size:13px;
  }
  .stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
  .stat-card{
    background:var(--panel);border:1px solid var(--border);border-radius:12px;
    padding:12px 16px;min-width:110px;
  }
  .stat-card .num{font-size:20px;font-weight:900;color:var(--yellow);}
  .stat-card .lbl{font-size:11px;color:var(--muted);margin-top:2px;}

  #product-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:14px;
  }
  .card{
    background:var(--panel);border:1px solid var(--border);border-radius:14px;
    overflow:hidden;display:flex;flex-direction:column;
  }
  .card img{width:100%;height:120px;object-fit:contain;background:var(--panel-2);}
  .card .body{padding:12px;display:flex;flex-direction:column;gap:8px;flex:1;}
  .card h3{font-size:13px;margin:0;line-height:1.4;}
  .tag-row{display:flex;gap:6px;flex-wrap:wrap;}
  .tag{font-size:10px;background:var(--panel-2);border:1px solid var(--border);color:var(--muted);padding:2px 7px;border-radius:20px;}
  .price-row{display:flex;gap:6px;}
  .price-row label{font-size:10px;color:var(--muted);display:block;margin-bottom:3px;}
  .price-row input{
    width:100%;background:var(--panel-2);border:1px solid var(--border);color:var(--text);
    padding:6px 8px;border-radius:8px;font-size:12px;
  }
  .card-actions{display:flex;gap:6px;margin-top:4px;}
  .card-actions .btn{flex:1;}
  .saved-flag{font-size:10px;color:var(--green);display:none;text-align:center;}

  /* modal */
  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;z-index:50;padding:16px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--panel);border:1px solid var(--border);border-radius:16px;
    padding:22px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;
  }
  .modal h2{margin-top:0;font-size:16px;}
  .field{margin-bottom:12px;}
  .field label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px;}
  .field input, .field select, .field textarea{
    width:100%;background:var(--panel-2);border:1px solid var(--border);color:var(--text);
    padding:9px 10px;border-radius:9px;font-size:13px;
  }
  .field textarea{resize:vertical;min-height:60px;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .modal-actions{display:flex;gap:10px;margin-top:16px;}
  .modal-actions .btn{flex:1;}
  #fab{
    position:fixed;bottom:24px;left:24px;width:56px;height:56px;border-radius:50%;
    background:var(--green);color:#04170a;font-size:26px;display:flex;align-items:center;
    justify-content:center;box-shadow:0 6px 20px rgba(34,197,94,.4);z-index:40;
  }
  .empty-state{
    grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);
    border:1px dashed var(--border);border-radius:14px;
  }
  .toast{
    position:fixed;bottom:20px;right:20px;background:var(--panel);border:1px solid var(--border);
    padding:12px 18px;border-radius:10px;font-size:13px;z-index:100;opacity:0;
    transform:translateY(10px);transition:.25s;
  }
  .toast.show{opacity:1;transform:translateY(0);}
  .hidden{display:none !important;}
  .spin{animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="wrap">

  <div id="login-screen">
    <h1>لوحة تحكم OFA STORE</h1>
    <p>سجّل الدخول بحساب Google الإداري الخاص بك لإدارة المنتجات (إضافة / تعديل الأسعار / حذف).</p>
    <button class="btn btn-primary" id="login-btn" onclick="doLogin()">تسجيل الدخول عبر Google</button>
    <p id="login-error" style="color:var(--red);display:none;"></p>
  </div>

  <div id="app" class="hidden">
    <header>
      <h1>متجر OFA <span class="badge">لوحة الإدارة</span></h1>
      <div id="auth-box">
        <div id="user-pill"></div>
        <button class="btn btn-outline btn-sm" onclick="doLogout()">خروج</button>
      </div>
    </header>

    <div class="stats">
      <div class="stat-card"><div class="num" id="stat-total">0</div><div class="lbl">إجمالي المنتجات</div></div>
      <div class="stat-card"><div class="num" id="stat-accounts">0</div><div class="lbl">حسابات</div></div>
      <div class="stat-card"><div class="num" id="stat-shipping">0</div><div class="lbl">شحن</div></div>
    </div>

    <div class="toolbar">
      <input type="text" id="search-box" placeholder="🔍 ابحث بالاسم أو اللعبة..." oninput="renderGrid()">
      <select id="filter-cat" onchange="renderGrid()">
        <option value="all">كل الأقسام</option>
        <option value="accounts">حسابات</option>
        <option value="shipping">شحن</option>
      </select>
    </div>

    <div id="product-grid"></div>
  </div>

  <button id="fab" class="hidden" onclick="openAddModal()">+</button>
</div>

<!-- Add/Edit full modal -->
<div class="overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">إضافة منتج جديد</h2>
    <input type="hidden" id="f-id">
    <div class="field">
      <label>اسم المنتج *</label>
      <input type="text" id="f-title" placeholder="مثال: 660 جوهرة PUBG">
    </div>
    <div class="grid-2">
      <div class="field">
        <label>القسم *</label>
        <select id="f-category">
          <option value="accounts">حسابات</option>
          <option value="shipping">شحن</option>
        </select>
      </div>
      <div class="field">
        <label>القسم الفرعي (subCategory)</label>
        <input type="text" id="f-subcategory" placeholder="مثال: android_gems_accounts">
      </div>
    </div>
    <div class="grid-2">
      <div class="field">
        <label>اللعبة</label>
        <input type="text" id="f-game" placeholder="مثال: PUBG">
      </div>
      <div class="field">
        <label>النظام (OS)</label>
        <input type="text" id="f-os" placeholder="Android / iOS">
      </div>
    </div>
    <div class="grid-2">
      <div class="field">
        <label>السعر بالدولار $ *</label>
        <input type="number" step="0.01" id="f-price" placeholder="0.00">
      </div>
      <div class="field">
        <label>السعر بالدينار الليبي (اختياري)</label>
        <input type="number" step="0.01" id="f-price-lyd" placeholder="0.00">
      </div>
    </div>
    <div class="grid-2">
      <div class="field">
        <label>سعر الخصم $ (اختياري)</label>
        <input type="number" step="0.01" id="f-discount" placeholder="0.00">
      </div>
      <div class="field">
        <label>سعر الخصم د.ل (اختياري)</label>
        <input type="number" step="0.01" id="f-discount-lyd" placeholder="0.00">
      </div>
    </div>
    <div class="field">
      <label>رابط الصورة (image URL)</label>
      <input type="text" id="f-image" placeholder="https://...">
    </div>
    <div class="field">
      <label>التفاصيل / الوصف</label>
      <textarea id="f-details" placeholder="تفاصيل المنتج..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveProduct()">حفظ المنتج</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc, addDoc, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// نفس إعدادات مشروعك في Firebase (من index.html)
const firebaseConfig = {
  apiKey: "AIzaSyBLFNy3aGvh37swegKjueYk2ksX4l0LROY",
  authDomain: "ofa-store.firebaseapp.com",
  projectId: "ofa-store",
  storageBucket: "ofa-store.firebasestorage.app",
  messagingSenderId: "775434744685",
  appId: "1:775434744685:web:f55d0c6e88788f48b1e064"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let products = [];
let currentUser = null;

window.doLogin = async function () {
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    errEl.textContent = "فشل تسجيل الدخول: " + e.message;
    errEl.style.display = 'block';
  }
};

window.doLogout = function () {
  signOut(auth);
};

onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  if (user) {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('fab').classList.remove('hidden');
    document.getElementById('user-pill').innerHTML =
      `<img src="${user.photoURL || ''}" onerror="this.style.display='none'"><span>${user.displayName || user.email}</span>`;
    await loadProducts();
  } else {
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
    document.getElementById('fab').classList.add('hidden');
  }
});

async function loadProducts() {
  showToast("جاري تحميل المنتجات...");
  try {
    const snap = await getDocs(collection(db, "products"));
    products = [];
    snap.forEach(d => {
      const data = d.data();
      data.id = d.id;
      products.push(data);
    });
    renderGrid();
  } catch (e) {
    showToast("خطأ في التحميل: تحقق من صلاحياتك (Security Rules)");
    console.error(e);
  }
}

window.renderGrid = function () {
  const grid = document.getElementById('product-grid');
  const search = document.getElementById('search-box').value.trim().toLowerCase();
  const catFilter = document.getElementById('filter-cat').value;

  let list = products.filter(p => {
    const matchesSearch = !search ||
      (p.title || '').toLowerCase().includes(search) ||
      (p.game || '').toLowerCase().includes(search);
    const matchesCat = catFilter === 'all' || p.category === catFilter;
    return matchesSearch && matchesCat;
  });

  document.getElementById('stat-total').textContent = products.length;
  document.getElementById('stat-accounts').textContent = products.filter(p => p.category === 'accounts').length;
  document.getElementById('stat-shipping').textContent = products.filter(p => p.category === 'shipping').length;

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state">لا توجد منتجات مطابقة. اضغط + لإضافة منتج جديد.</div>`;
    return;
  }

  grid.innerHTML = list.map(p => `
    <div class="card">
      <img src="${p.image || 'https://via.placeholder.com/300x150?text=No+Image'}" onerror="this.src='https://via.placeholder.com/300x150?text=No+Image'">
      <div class="body">
        <h3>${escapeHtml(p.title || 'بدون اسم')}</h3>
        <div class="tag-row">
          <span class="tag">${p.category === 'accounts' ? 'حسابات' : 'شحن'}</span>
          ${p.game ? `<span class="tag">${escapeHtml(p.game)}</span>` : ''}
          ${p.os ? `<span class="tag">${escapeHtml(p.os)}</span>` : ''}
        </div>
        <div class="price-row">
          <div>
            <label>السعر $</label>
            <input type="number" step="0.01" id="price-${p.id}" value="${p.price ?? ''}">
          </div>
          <div>
            <label>سعر الخصم $</label>
            <input type="number" step="0.01" id="disc-${p.id}" value="${p.discount_price ?? ''}">
          </div>
        </div>
        <div class="card-actions">
          <button class="btn btn-blue btn-sm" onclick="quickSavePrice('${p.id}')">💾 حفظ السعر</button>
          <button class="btn btn-outline btn-sm" onclick="openEditModal('${p.id}')">✏️ تعديل كامل</button>
          <button class="btn btn-red btn-sm" onclick="deleteProduct('${p.id}')">🗑️</button>
        </div>
        <div class="saved-flag" id="flag-${p.id}">تم الحفظ ✔</div>
      </div>
    </div>
  `).join('');
};

window.quickSavePrice = async function (id) {
  const priceVal = parseFloat(document.getElementById(`price-${id}`).value);
  const discVal = document.getElementById(`disc-${id}`).value;
  try {
    const updateData = { price: isNaN(priceVal) ? 0 : priceVal };
    updateData.discount_price = discVal === '' ? null : parseFloat(discVal);
    await updateDoc(doc(db, "products", id), updateData);
    const idx = products.findIndex(p => p.id === id);
    if (idx > -1) Object.assign(products[idx], updateData);
    const flag = document.getElementById(`flag-${id}`);
    flag.style.display = 'block';
    setTimeout(() => flag.style.display = 'none', 1500);
    showToast("تم تحديث السعر بنجاح");
  } catch (e) {
    showToast("فشل الحفظ: " + e.message);
    console.error(e);
  }
};

window.deleteProduct = async function (id) {
  const p = products.find(x => x.id === id);
  if (!confirm(`هل أنت متأكد من حذف "${p?.title || 'هذا المنتج'}" نهائياً؟`)) return;
  try {
    await deleteDoc(doc(db, "products", id));
    products = products.filter(x => x.id !== id);
    renderGrid();
    showToast("تم حذف المنتج");
  } catch (e) {
    showToast("فشل الحذف: " + e.message);
    console.error(e);
  }
};

window.openAddModal = function () {
  document.getElementById('modal-title').textContent = "إضافة منتج جديد";
  document.getElementById('f-id').value = '';
  ['title','subcategory','game','os','price','price-lyd','discount','discount-lyd','image','details'].forEach(f => {
    document.getElementById('f-' + f).value = '';
  });
  document.getElementById('f-category').value = 'accounts';
  document.getElementById('modal-overlay').classList.add('show');
};

window.openEditModal = function (id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modal-title').textContent = "تعديل المنتج";
  document.getElementById('f-id').value = p.id;
  document.getElementById('f-title').value = p.title || '';
  document.getElementById('f-category').value = p.category || 'accounts';
  document.getElementById('f-subcategory').value = p.subCategory || '';
  document.getElementById('f-game').value = p.game || '';
  document.getElementById('f-os').value = p.os || '';
  document.getElementById('f-price').value = p.price ?? '';
  document.getElementById('f-price-lyd').value = p.price_lyd ?? '';
  document.getElementById('f-discount').value = p.discount_price ?? '';
  document.getElementById('f-discount-lyd').value = p.discount_price_lyd ?? '';
  document.getElementById('f-image').value = p.image || '';
  document.getElementById('f-details').value = p.details || p.description || '';
  document.getElementById('modal-overlay').classList.add('show');
};

window.closeModal = function () {
  document.getElementById('modal-overlay').classList.remove('show');
};

window.saveProduct = async function () {
  const id = document.getElementById('f-id').value;
  const title = document.getElementById('f-title').value.trim();
  const price = parseFloat(document.getElementById('f-price').value);

  if (!title) { showToast("يرجى إدخال اسم المنتج"); return; }
  if (isNaN(price)) { showToast("يرجى إدخال سعر صحيح"); return; }

  const getNum = (id) => {
    const v = document.getElementById(id).value;
    return v === '' ? null : parseFloat(v);
  };

  const data = {
    title,
    category: document.getElementById('f-category').value,
    subCategory: document.getElementById('f-subcategory').value.trim(),
    game: document.getElementById('f-game').value.trim(),
    os: document.getElementById('f-os').value.trim(),
    price,
    price_lyd: getNum('f-price-lyd'),
    discount_price: getNum('f-discount'),
    discount_price_lyd: getNum('f-discount-lyd'),
    image: document.getElementById('f-image').value.trim(),
    details: document.getElementById('f-details').value.trim(),
  };

  const btn = document.getElementById('save-btn');
  btn.textContent = "جاري الحفظ...";
  btn.disabled = true;

  try {
    if (id) {
      await updateDoc(doc(db, "products", id), data);
      const idx = products.findIndex(p => p.id === id);
      if (idx > -1) Object.assign(products[idx], data);
      showToast("تم تحديث المنتج");
    } else {
      data.createdAt = Date.now();
      const ref = await addDoc(collection(db, "products"), data);
      data.id = ref.id;
      products.push(data);
      showToast("تمت إضافة المنتج");
    }
    closeModal();
    renderGrid();
  } catch (e) {
    showToast("فشل الحفظ: " + e.message);
    console.error(e);
  } finally {
    btn.textContent = "حفظ المنتج";
    btn.disabled = false;
  }
};

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
</html>
